<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DesignOS — Product Design Mastery Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="DesignOS — a self-paced product design mastery curriculum, interview gym, flashcards, and reference platform.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .error-box { background: #fee; color: #c33; padding: 20px; margin: 20px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; word-break: break-word; }
</style>
</head>
<body>
<div id="dos-root" class="dos" data-screen-label="DesignOS">
  <div style="padding: 20px; color: #999;">Initializing... (Updated: 2026-07-12 10:25 UTC)</div>
</div>

<script>
  const errorLog = [];

  window.addEventListener('error', (e) => {
    const msg = `ERROR: ${e.filename}:${e.lineno} - ${e.message}`;
    errorLog.push(msg);
    console.error(msg);
    updateErrors();
  });

  window.addEventListener('unhandledrejection', (e) => {
    const msg = `UNHANDLED PROMISE: ${e.reason}`;
    errorLog.push(msg);
    console.error(msg);
    updateErrors();
  });

  function updateErrors() {
    const root = document.getElementById('dos-root');
    if (errorLog.length > 0) {
      root.innerHTML = '<div class="error-box">ERRORS:\n\n' + errorLog.join('\n\n') + '</div>';
    }
  }

  setTimeout(() => {
    if (!window.__dos) {
      errorLog.push('TIMEOUT: App did not initialize after 8 seconds');
      updateErrors();
    }
  }, 8000);
</script>

<script type="module" src="app.js"></script>
</body>
</html>
